services:
  cybertracker_db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cybertracker}
    env_file:
      - .env
    volumes:
      - cybertracker_postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cybertracker_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cybertracker-api:${TAG:-latest}
    depends_on:
      cybertracker_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: cybertracker_db
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  cybertracker_postgres:
